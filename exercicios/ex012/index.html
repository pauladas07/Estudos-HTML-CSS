<!DOCTYPE html>
<html lang="pt-br">
<head>
                                        <meta charset="UTF-8">
                                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                        <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
                                        <title>Videos com HTML5</title>
</head>
<body>
      <h1>Inserindo Videos Hospedados localmente</h1>       
      <p>Este video esta hospedado o meu proprio servidor.</p>
      <video width="600" poster="imagens/capa.png" controls loop>
          <source src="midia/Meu-Video.mp4" type="video/mp4">
          <source src="midia/Meu-Video-webm.webm" type="video/mp4">
          <source src="midia/Meu-Video-mkv.mkv" type="video/mkv">
          <p>Seu navegador não tem compatibilidade com a reproducao de videos.</p>
      </video> 

      <h1>Inserindo Videos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/AKeUssuu3Is?si=fj4Try7lAc4-s9E3" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>    
</body>
</html>
